<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Aivonex Technologies</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .signup-page {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }
        .signup-page::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }
        .signup-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .signup-left {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .signup-right {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }
        .logo i { color: #667eea; font-size: 2.5rem; }
        .logo .highlight { color: #667eea; }
        .signup-form h2 {
            font-size: 2rem;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }
        .signup-form p {
            color: #6b7280;
            margin-bottom: 2rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: #374151;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-wrapper input:focus, .input-wrapper select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .terms input {
            margin-top: 0.25rem;
        }
        .btn-signup {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #6b7280;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .signup-right h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .signup-right p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .benefit-list {
            list-style: none;
            text-align: left;
        }
        .benefit-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .benefit-list i {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-home:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .signup-container {
                grid-template-columns: 1fr;
                margin: 20px;
            }
            .signup-right {
                display: none;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <div class="signup-page">
        <div class="signup-container">
            <div class="signup-left">
                <a href="../index.html" class="logo">
                    <i class="fas fa-robot"></i>
                    <span>Aivonex<span class="highlight">Tech</span></span>
                </a>

                <div class="signup-form">
                    <h2>Create Account</h2>
                    <p>Join our community of learners</p>

                    <form id="signupForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="firstName" placeholder="John" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="lastName" placeholder="Doe" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" placeholder="john@example.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Phone Number</label>
                            <div class="input-wrapper">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="Min. 6 characters" minlength="6" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                            </div>
                        </div>

                        <div class="terms">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">
                                I agree to the <a href="#" style="color: #667eea;">Terms of Service</a> and <a href="#" style="color: #667eea;">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="btn-signup">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </form>

                    <div class="login-link">
                        Already have an account? <a href="login.html">Login</a>
                    </div>
                </div>
            </div>

            <div class="signup-right">
                <h2>Join Today!</h2>
                <p>Unlock endless learning opportunities</p>

                <ul class="benefit-list">
                    <li>
                        <i class="fas fa-check"></i>
                        <span>Free course enrollment</span>
                    </li>
                    <li>
                        <i class="fas fa-check"></i>
                        <span>Track your progress</span>
                    </li>
                    <li>
                        <i class="fas fa-check"></i>
                        <span>Download certificates</span>
                    </li>
                    <li>
                        <i class="fas fa-check"></i>
                        <span>Access to community</span>
                    </li>
                    <li>
                        <i class="fas fa-check"></i>
                        <span>Career guidance</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('❌ Passwords do not match!');
                return;
            }
            
            const userData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password,
                joinedDate: new Date().toISOString()
            };
            
            // Save to localStorage
            const users = JSON.parse(localStorage.getItem('aivonex_users') || '[]');
            
            // Check if email already exists
            if (users.find(u => u.email === userData.email)) {
                alert('❌ Email already registered! Please login.');
                return;
            }
            
            users.push(userData);
            localStorage.setItem('aivonex_users', JSON.stringify(users));
            
            // Save current user
            localStorage.setItem('aivonex_current_user', JSON.stringify(userData));
            
            // Show success
            const btn = document.querySelector('.btn-signup');
            btn.innerHTML = '<i class="fas fa-check"></i> Account Created!';
            btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
